<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luxury Neon Birthday Wish</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #2b1055 0%, #12001f 45%, #05010d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: white;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .stars span {
      position: absolute;
      display: block;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      animation: twinkle linear infinite;
      opacity: 0.7;
    }

    .stars span:nth-child(1) { left: 10%; top: 20%; animation-duration: 3s; }
    .stars span:nth-child(2) { left: 25%; top: 80%; animation-duration: 5s; }
    .stars span:nth-child(3) { left: 70%; top: 30%; animation-duration: 4s; }
    .stars span:nth-child(4) { left: 85%; top: 65%; animation-duration: 6s; }
    .stars span:nth-child(5) { left: 55%; top: 10%; animation-duration: 2.5s; }
    .stars span:nth-child(6) { left: 40%; top: 55%; animation-duration: 3.5s; }
    .stars span:nth-child(7) { left: 75%; top: 85%; animation-duration: 4.5s; }
    .stars span:nth-child(8) { left: 15%; top: 50%; animation-duration: 3s; }

    @keyframes twinkle {
      0%, 100% {
        transform: scale(0.5);
        opacity: 0.4;
      }
      50% {
        transform: scale(1.5);
        opacity: 1;
      }
    }

    .card {
      width: min(92%, 420px);
      padding: 32px 24px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow:
        0 0 20px rgba(255, 0, 255, 0.35),
        0 0 60px rgba(0, 255, 255, 0.18),
        0 0 120px rgba(255, 0, 150, 0.15);
      text-align: center;
      z-index: 5;
      position: relative;
      animation: floatCard 4s ease-in-out infinite;
    }

    @keyframes floatCard {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    .cake {
      font-size: 4rem;
      margin-bottom: 10px;
      animation: bounce 2s infinite;
      filter: drop-shadow(0 0 12px #ff66ff);
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 9vw, 4.5rem);
      font-weight: 400;
      color: #fff;
      text-shadow:
        0 0 8px #ff7bff,
        0 0 18px #ff4dff,
        0 0 30px #ff00ff;
    }

    .name {
      margin-top: 14px;
      font-size: 1.3rem;
      font-weight: 600;
      color: #ffd6ff;
      letter-spacing: 1px;
    }

    p {
      margin-top: 18px;
      line-height: 1.8;
      color: rgba(255,255,255,0.92);
      font-size: 1rem;
    }

    .glow-line {
      width: 120px;
      height: 4px;
      margin: 22px auto;
      border-radius: 100px;
      background: linear-gradient(to right, #ff00ff, #00ffff);
      box-shadow:
        0 0 10px #ff00ff,
        0 0 20px #00ffff;
    }

    .btn-group {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    button {
      border: none;
      padding: 14px 22px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: 0.3s ease;
      color: white;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      box-shadow:
        0 0 10px rgba(255,0,255,0.6),
        0 0 20px rgba(0,255,255,0.5);
    }

    button:hover {
      transform: scale(1.08);
      box-shadow:
        0 0 20px rgba(255,0,255,0.8),
        0 0 40px rgba(0,255,255,0.7);
    }

    .love-text {
      margin-top: 22px;
      display: none;
      font-size: 1rem;
      color: #ffe6ff;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0px);
      }
    }

    .floating-hearts {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }

    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 24px;
      animation: floatUp linear infinite;
      opacity: 0.7;
    }

    .heart:nth-child(1) { left: 10%; animation-duration: 7s; }
    .heart:nth-child(2) { left: 30%; animation-duration: 9s; }
    .heart:nth-child(3) { left: 50%; animation-duration: 8s; }
    .heart:nth-child(4) { left: 70%; animation-duration: 10s; }
    .heart:nth-child(5) { left: 90%; animation-duration: 6s; }

    @keyframes floatUp {
      from {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      to {
        transform: translateY(-120vh) scale(1.4);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 18px;
      }

      button {
        width: 100%;
      }

      .btn-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <canvas id="confetti"></canvas>

  <div class="stars">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="floating-hearts">
    <div class="heart">💖</div>
    <div class="heart">✨</div>
    <div class="heart">💜</div>
    <div class="heart">🎉</div>
    <div class="heart">💎</div>
  </div>

  <div class="card">
    <div class="cake">🎂</div>

    <h1>Happy Birthday</h1>

    <div class="name">Bhairavi ✨</div>

    <div class="glow-line"></div>

    <p>
      May your birthday shine brighter than neon lights and sparkle with endless happiness,
      love, luxury, success, and unforgettable memories.
    </p>

    <div class="btn-group">
      <button onclick="launchConfetti()">Celebrate 🎉</button>
      <button onclick="showLove()">Open Message 💌</button>
    </div>

    <div class="love-text" id="loveText">
      You are truly amazing, special, and deeply loved.
      Keep shining like the brightest star in the universe 💖✨
    </div>
  </div>

  <script>
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');

    let W = window.innerWidth;
    let H = window.innerHeight;

    canvas.width = W;
    canvas.height = H;

    let particles = [];

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createParticles(count = 200) {
      const colors = ['#ff00ff', '#00ffff', '#ffffff', '#ff66cc', '#66ffff'];

      for (let i = 0; i < count; i++) {
        particles.push({
          x: W / 2,
          y: H / 3,
          size: random(4, 9),
          color: colors[Math.floor(Math.random() * colors.length)],
          speedX: random(-6, 6),
          speedY: random(-10, 5),
          gravity: 0.12,
          alpha: 1,
          rotate: random(0, 360)
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, W, H);

      particles.forEach((p, index) => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotate);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();

        p.x += p.speedX;
        p.y += p.speedY;
        p.speedY += p.gravity;
        p.alpha -= 0.008;

        if (p.alpha <= 0) {
          particles.splice(index, 1);
        }
      });

      requestAnimationFrame(drawParticles);
    }

    function launchConfetti() {
      createParticles(250);
    }

    function showLove() {
      document.getElementById('loveText').style.display = 'block';
      launchConfetti();
    }

    drawParticles();
    launchConfetti();

    window.addEventListener('resize', () => {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
    });
  </script>

</body>
</html>
